<body>
  <h1>Langkah 10: Mendekorasi Text</h1>
  <p style="text-transform: uppercase;">Text dengan uppercase</p>
  <p style="text-transform: lowercase;">Text dengan lowercase</p>
  <p style="text-transform: capitalize;">Text dengan Capitalize</p>
