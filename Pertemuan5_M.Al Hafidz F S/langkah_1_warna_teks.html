<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langkah 1 - Mengganti Warna Tulisan</title>
  <style>
    p {
      color: blue;
    }
  </style>
</head>
<body>
  <h1>Langkah 1: Mengganti Warna Tulisan</h1>
  <p>Ini adalah contoh paragraf yang warna tulisannya diatur menggunakan properti <code>color</code> pada CSS.</p>
  <p>CSS: <code>p { color: blue; }</code></p>
</body>
</html>
