<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langkah 7 - Mengatur Lebar Elemen</title>
  <style>
    .p {
      border: 1px solid black;
      padding: 5px;
    }
    .wide {
      width: 300px;
    }
    .narrow {
      width: 50px;
    }
  </style>
</head>
<body>
  <h1>Langkah 7: Mengatur Lebar Elemen</h1>
  <p class="p">Aku adalah tag p tanpa lebar (mendapatkan lebar 100% secara default).</p>
  <p class="p wide">Aku adalah tag p wide (lebar 300px).</p>
  <p class="p narrow">Aku adalah tag p narrow (lebar 50px).</p>
</body>
</html>
