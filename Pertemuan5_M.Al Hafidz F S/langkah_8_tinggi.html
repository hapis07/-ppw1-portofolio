<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langkah 8 - Mengatur Tinggi Elemen</title>
  <style>
    .p {
      border: 1px solid black;
      padding: 5px;
    }
    .high {
      height: 300px;
    }
    .low {
      height: 50px;
    }
  </style>
</head>
<body>
  <h1>Langkah 8: Mengatur Tinggi Elemen</h1>
  <p class="p">Aku adalah tag p tanpa tinggi spesifik (tinggi otomatis mengikuti konten).</p>
  <p class="p high">Aku adalah tag p tinggi (tinggi 300px, ada ruang kosong).</p>
  <p class="p low">Aku adalah tag p rendah (tinggi 50px, konten mungkin terpotong jika terlalu panjang).</p>
</body>
</html>
