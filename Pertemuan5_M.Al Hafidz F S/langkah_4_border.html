<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langkah 4 - Jenis-jenis Border</title>
  <style>
    p.solid { border-style: solid; }
    p.dotted { border-style: dotted; }
    p.dashed { border-style: dashed; }
    p.double { border-style: double; }
    p.groove { border-style: groove; }
    p.ridge { border-style: ridge; }
    p.inset { border-style: inset; }
    p.outset { border-style: outset; }
    p.none { border-style: none; }
    p.hidden { border-style: hidden; }
    p.mix { border-style: dotted dashed solid double; }

    p {
      padding: 0.75rem;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>
  <h1>Langkah 4: Jenis-jenis Border CSS</h1>
  <p class="solid">Border solid = lurus</p>
  <p class="dotted">Border dotted = titik titik</p>
  <p class="dashed">Border dashed = garis terpisah</p>
  <p class="double">Border double = ada dua border seperti kotak.</p>
  <p class="groove">Border groove</p>
  <p class="ridge">Border ridge</p>
  <p class="inset">Border inset.</p>
  <p class="outset">Border outset.</p>
  <p class="none">Tanpa border.</p>
  <p class="hidden">Border tersembunyi.</p>
  <p class="mix">Border campuran.</p>
</body>
</html>
