<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langkah 3 - Background dengan Gambar</title>
  <style>
    body {
      background-image: url('https://via.placeholder.com/1200x800');
      background-repeat: no-repeat;
      background-position: right top;
      background-size: cover;
      margin: 0;
      padding: 2rem;
      color: #111;
      font-family: sans-serif;
    }
    .content {
      background: rgba(255, 255, 255, 0.85);
      padding: 1.25rem;
      max-width: 600px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Langkah 3: Background dengan Gambar</h1>
    <p>Contoh berikut menggunakan properti <code>background-image</code> untuk menampilkan gambar sebagai latar belakang seluruh halaman.</p>
    <ul>
      <li><code>background-repeat: no-repeat;</code> untuk mencegah pengulangan gambar</li>
      <li><code>background-position: right top;</code> untuk mengatur posisi gambar</li>
    </ul>
  </div>
</body>
</html>
