<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Langkah 5 - Padding</title>
  <style>
    .padding-all {
      border: 1px solid violet;
      padding: 10px 5px 2px 20px;
    }
    .padding-each {
      border: 1px solid black;
      padding-top: 5px;
      padding-right: 10px;
      padding-bottom: 15px;
      padding-left: 25px;
    }
  </style>
</head>
<body>
  <h1>Langkah 5: Padding</h1>
  <p class="padding-all">Aku adalah tag p dengan padding (all).</p>
  <p class="padding-each">Aku adalah tag p dengan padding (setiap sisi).</p>
</body>
</html>
