<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2 - Form Pendaftaran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

<div class="container bg-white p-4 rounded shadow-sm" style="max-width: 800px;">
    
    <div id="alertSukses" class="alert alert-success alert-dismissible fade d-none" role="alert">
        Data berhasil disimpan!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h2 class="mb-4">Pendaftaran Mahasiswa Baru</h2>

    <form id="formDaftar">
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" class="form-control is-valid" required>
                <div class="valid-feedback">Nama sudah diisi.</div>
            </div>
            <div class="col-md-6">
                <label class="form-label">NIM</label>
                <input type="text" class="form-control is-invalid" required>
                <div class="invalid-feedback">NIM tidak boleh kosong.</div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="nama@email.com">
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Program Studi</label>
                <select class="form-select">
                    <option selected disabled>Pilih Prodi</option>
                     <option value="" selected disabled>Pilih Prodi...</option>
                        <option value="TI">Teknologi Rekayasa Perangkat Lunak</option>
                        <option value="SI">Teknologi Rekayasa Internet</option>
                        <option value="TE">Teknologi Rekayasa Instrumentasi dan Kontrol</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Semester</label>
                <select class="form-select">
                    <option selected disabled>Pilih Semester</option>
                    <option>1</option>
                    <option>2</option>
                </select>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Alamat</label>
            <textarea class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label">Foto Profil</label>
            <input type="file" class="form-control">
        </div>

        <div class="d-flex gap-2">
            <button type="button" class="btn btn-primary" onclick="simpanData()">Simpan</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
    </form>
</div>

<script>
    function simpanData() {
        // Hanya menghilangkan class d-none (display: none) dan menambah class show
        const alert = document.getElementById('alertSukses');
        alert.classList.remove('d-none');
        alert.classList.add('show');
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
