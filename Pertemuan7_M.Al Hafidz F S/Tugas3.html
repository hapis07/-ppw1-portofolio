<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Animasi Natural</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --btn-bg: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .teks-fade-in {
            animation: fadeIn 1.5s ease-out;
        }

        .container-tombol {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background-color: var(--btn-bg);
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-warna:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .btn-transform:hover {
            transform: scale(1.08);
        }

        .btn-shadow:hover {
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            border-color: transparent;
            transform: translateY(-2px);
        }

        @keyframes putar-loading {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: putar-loading 1s infinite linear;
            margin: 20px 0;
        }

        .wadah-kartu {
            perspective: 1000px;
            width: 200px;
            height: 120px;
            margin-top: 20px;
        }

        .kartu {
            width: 100%;
            height: 100%;
            background-color: var(--btn-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s ease;
        }

        .wadah-kartu:hover .kartu {
            transform: rotateY(180deg);
        }

        hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 30px 0;
        }
    </style>
</head>
<body>

    <h2 class="teks-fade-in">Teks ini muncul dengan halus (Fade In)</h2>

    <hr>

    <h3>Tombol Transition:</h3>
    <div class="container-tombol">
        <button class="btn-warna">Hover: Ganti Warna</button>
        <button class="btn-transform">Hover: Membesar</button>
        <button class="btn-shadow">Hover: Ada Bayangan</button>
    </div>

    <hr>

    <h3>Loading Spinner:</h3>
    <div class="loading"></div>

    <hr>

    <h3>Bonus Kartu Rotate:</h3>
    <div class="wadah-kartu">
        <div class="kartu">Hover Buat Muter</div>
    </div>

</body>
</html>
