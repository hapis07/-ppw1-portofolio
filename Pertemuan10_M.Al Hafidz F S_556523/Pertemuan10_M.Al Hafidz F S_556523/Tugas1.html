<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas 1 - Penulisan JavaScript & Output</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CARA 1: EMBED di head -->
    <script>
        // console.log = muncul di Console browser (tekan F12)
        console.log("Halo dari JavaScript EMBED!");

        // alert = muncul sebagai kotak pop-up
        alert("Ini pesan dari JavaScript EMBED!");
    </script>
</head>
<body class="p-4">

    <h1 class="mb-4">Tugas 1 - Penulisan JavaScript & Output</h1>

    <!-- CARA 2: INLINE -->
    <div class="card mb-3">
        <div class="card-header bg-primary text-white">
            Cara 2: JavaScript INLINE
        </div>
        <div class="card-body">
            <!-- document.write = menulis langsung ke halaman -->
            <button class="btn btn-outline-primary me-2"
                onclick="document.write('<h3>Halo dari INLINE pakai document.write!</h3>')">
                Klik - document.write
            </button>

            <button class="btn btn-outline-danger"
                onclick="alert('Ini alert dari JavaScript INLINE!')">
                Klik - alert
            </button>
        </div>
    </div>

    <!-- CARA 1 LANJUTAN: EMBED di body -->
    <div class="card mb-3">
        <div class="card-header bg-success text-white">
            Cara 1: JavaScript EMBED di Body
        </div>
        <div class="card-body">
            <p>Hasil innerHTML:</p>
            <div id="output-innerHTML" class="alert alert-success">Menunggu JavaScript...</div>

            <script>
                // innerHTML = mengubah isi elemen HTML
                var elemen = document.getElementById("output-innerHTML");
                elemen.innerHTML = "Berhasil! Ini dari JavaScript EMBED pakai innerHTML!";

                console.log("Ini dari EMBED di body!");
            </script>
        </div>
    </div>

    <!-- CARA 3: EKSTERNAL -->
    <div class="card mb-3">
        <div class="card-header bg-warning">
            Cara 3: JavaScript EKSTERNAL
        </div>
        <div class="card-body">
            <p>Hasil dari file script_tugas1.js:</p>
            <div id="output-eksternal" class="alert alert-warning">Menunggu JavaScript eksternal...</div>
        </div>
    </div>

    <!-- Panggil file JS eksternal (typo diperbaiki!) -->
    <script src="script_tugas1.js"></script>

</body>
</html>
